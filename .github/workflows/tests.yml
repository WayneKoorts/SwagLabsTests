name: Tests

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    name: Test (${{ matrix.browser }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: nuget-

      - name: Build
        run: dotnet build src/SwagLabsTests.sln

      - name: Install Playwright browser
        run: pwsh src/SwagLabsTests/bin/Debug/net10.0/playwright.ps1 install --with-deps ${{ matrix.browser }}

      - name: Run tests
        run: >
          dotnet test src/SwagLabsTests.sln --no-build
          --logger "trx;LogFileName=test-results.trx"
          -- Playwright.BrowserName=${{ matrix.browser }}

      - name: Test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Results (${{ matrix.browser }})
          path: '**/test-results.trx'
          reporter: dotnet-trx
